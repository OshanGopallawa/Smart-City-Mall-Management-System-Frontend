services:
  mall-frontend:
    build:
      context: .
      target: production
      args:
        - REACT_APP_API_URL=https://api-gateway-kd0r.onrender.com
        - REACT_APP_USER_API_URL=https://api-gateway-kd0r.onrender.com
        - REACT_APP_OPERATOR_API_URL=https://api-gateway-kd0r.onrender.com
        - REACT_APP_MALL_API_URL=https://api-gateway-kd0r.onrender.com
        - REACT_APP_ANALYTICS_API_URL=https://api-gateway-kd0r.onrender.com
        - REACT_APP_INTERNAL_API_KEY=MallInternalKey2026
    container_name: mall-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3