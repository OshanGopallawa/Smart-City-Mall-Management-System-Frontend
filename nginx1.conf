events {
  worker_connections 1024;
}

http {
  upstream user-service {
    server user-service:3001;
  }
  upstream operator-service {
    server operator-service:3002;
  }
  upstream mall-api-service {
    server mall-api-service:3003;
  }
  upstream analytics-service {
    server analytics-service:3004;
  }

  server {
    listen 80;

    location /api/auth/users/ {
      proxy_pass http://user-service/api/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/users/ {
      proxy_pass http://user-service/api/users/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/auth/operators/ {
      proxy_pass http://operator-service/api/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/operators/ {
      proxy_pass http://operator-service/api/operators/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/stores/ {
      proxy_pass http://mall-api-service/api/stores/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/deals/ {
      proxy_pass http://mall-api-service/api/deals/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/events/ {
      proxy_pass http://mall-api-service/api/events/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analytics/ {
      proxy_pass http://analytics-service/api/analytics/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/internal/ {
      proxy_pass http://analytics-service/api/internal/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /health/users {
      proxy_pass http://user-service/health;
    }
    location /health/operators {
      proxy_pass http://operator-service/health;
    }
    location /health/mall {
      proxy_pass http://mall-api-service/health;
    }
    location /health/analytics {
      proxy_pass http://analytics-service/health;
    }
  }
}