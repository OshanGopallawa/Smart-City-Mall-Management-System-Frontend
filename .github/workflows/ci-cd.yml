name: Mall Frontend - CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: mall-frontend
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Test
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint --if-present

      - name: Run tests with coverage
        run: npm run test:ci -- --coverage --watchAll=false
        env:
          NODE_ENV: test
          CI: true
          REACT_APP_API_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Snyk Security Scan
  # ─────────────────────────────────────────────
  security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NODE_VERSION }}'
          cache: 'npm'

      - run: npm ci

      - uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: '${{ secrets.SNYK_TOKEN }}'
        with:
          args: '--severity-threshold=high --sarif-file-output=snyk.sarif'

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: snyk.sarif

  # ─────────────────────────────────────────────
  # JOB 3: Build & Push Docker Image to GHCR
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy.sarif

  # ─────────────────────────────────────────────
  # JOB 4: Deploy to Render via Deploy Hook
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Trigger Render deploy hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" != "200" ]; then
            echo "Deploy hook failed with HTTP $RESPONSE"
            exit 1
          fi
          echo "Deploy hook triggered successfully"

      - name: Wait for deploy
        run: sleep 90

      - name: Smoke test
        run: |
          curl --fail --retry 8 --retry-delay 15 --retry-connrefused \
            ${{ secrets.FRONTEND_HEALTH_URL }} || exit 1
          echo "Frontend smoke test passed"